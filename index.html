<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Annotation Tool</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #1a1a2e;
        color: #e0e0e0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* Toolbar */
      #toolbar {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 10px 16px;
        background: #16213e;
        border-bottom: 1px solid #0f3460;
        flex-wrap: wrap;
      }
      #toolbar label {
        font-size: 13px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      #toolbar input[type="range"] {
        width: 80px;
        accent-color: #e94560;
      }
      .btn {
        padding: 6px 14px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 500;
      }
      .btn-primary {
        background: #e94560;
        color: #fff;
      }
      .btn-primary:hover {
        background: #c73a52;
      }
      .btn-secondary {
        background: #0f3460;
        color: #e0e0e0;
        border: 1px solid #1a4a7a;
      }
      .btn-secondary:hover {
        background: #1a4a7a;
      }
      .btn-icon {
        background: none;
        border: 1px solid #0f3460;
        color: #e0e0e0;
        padding: 4px 10px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
      }
      .btn-icon:hover {
        background: #0f3460;
      }
      .btn-icon:disabled {
        opacity: 0.3;
        cursor: default;
      }
      .btn-icon.active {
        background: #0f3460;
        border-color: #e94560;
      }
      .toolbar-sep {
        width: 1px;
        height: 24px;
        background: #0f3460;
      }

      /* Main layout */
      #main {
        display: flex;
        flex: 1;
        overflow: hidden;
      }
      #canvas-wrap {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0d0d1a;
        position: relative;
        overflow: hidden;
      }
      #canvas-wrap.empty::after {
        content: "Upload an image to begin";
        color: #555;
        font-size: 18px;
        position: absolute;
      }
      canvas {
        display: block;
        cursor: crosshair;
      }

      /* Sidebar */
      #sidebar {
        width: 300px;
        min-width: 300px;
        background: #16213e;
        border-left: 1px solid #0f3460;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .sidebar-section {
        padding: 10px 12px;
        border-bottom: 1px solid #0f3460;
      }
      .sidebar-section h3 {
        font-size: 13px;
        text-transform: uppercase;
        color: #888;
        margin-bottom: 8px;
        letter-spacing: 0.5px;
      }
      .list-wrap {
        flex: 1;
        overflow-y: auto;
        padding: 0;
      }

      /* Box list */
      .box-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        cursor: pointer;
        border-bottom: 1px solid #0f3460;
        transition: background 0.15s;
      }
      .box-item:hover {
        background: #1a2a4a;
      }
      .box-item.selected {
        background: #1a3a5a;
        outline: 2px solid #e94560;
        outline-offset: -2px;
      }
      .box-item .swatch {
        width: 16px;
        height: 16px;
        border-radius: 3px;
        flex-shrink: 0;
        border: 1px solid rgba(255, 255, 255, 0.2);
      }
      .box-item .desc {
        flex: 1;
        font-size: 13px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .box-item .del-btn {
        background: none;
        border: none;
        color: #e94560;
        cursor: pointer;
        font-size: 16px;
        padding: 0 4px;
        opacity: 0.6;
      }
      .box-item .del-btn:hover {
        opacity: 1;
      }

      /* Color list */
      .color-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 12px;
        border-bottom: 1px solid #0f3460;
      }
      .color-item .color-pick {
        width: 28px;
        height: 28px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 4px;
        cursor: pointer;
        padding: 0;
      }
      .color-item .color-label {
        font-size: 13px;
        flex: 1;
      }

      /* Modal */
      #modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        z-index: 100;
        align-items: center;
        justify-content: center;
      }
      #modal-overlay.active {
        display: flex;
      }
      #modal {
        background: #16213e;
        border: 1px solid #0f3460;
        border-radius: 8px;
        padding: 24px;
        min-width: 340px;
      }
      #modal h3 {
        margin-bottom: 12px;
        font-size: 16px;
      }
      #modal input[type="text"] {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid #0f3460;
        background: #0d0d1a;
        color: #e0e0e0;
        border-radius: 4px;
        font-size: 14px;
        outline: none;
      }
      #modal input[type="text"]:focus {
        border-color: #e94560;
      }
      #modal .modal-actions {
        margin-top: 16px;
        display: flex;
        gap: 8px;
        justify-content: flex-end;
      }
      #modal .modal-hint {
        font-size: 12px;
        color: #888;
        margin-top: 8px;
      }

      /* Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #0d0d1a;
      }
      ::-webkit-scrollbar-thumb {
        background: #0f3460;
        border-radius: 3px;
      }
    </style>
  </head>
  <body>
    <div id="toolbar">
      <label class="btn btn-primary" style="cursor: pointer">
        Upload Image
        <input
          type="file"
          id="file-input"
          accept="image/*"
          style="display: none"
        />
      </label>
      <button class="btn btn-primary" id="download-btn" disabled>
        Download Image
      </button>
      <button class="btn btn-secondary" id="save-ann-btn" disabled>
        Save Annotations
      </button>
      <label class="btn btn-secondary" style="cursor: pointer">
        Load Annotations
        <input
          type="file"
          id="load-ann-input"
          accept=".json"
          style="display: none"
        />
      </label>
      <div class="toolbar-sep"></div>
      <label
        >Thickness
        <input type="range" id="thickness" min="1" max="10" value="2" />
        <span id="thickness-val">2</span></label
      >
      <label
        >Font Size
        <input type="range" id="fontsize" min="8" max="48" value="14" />
        <span id="fontsize-val">14</span></label
      >
      <div class="toolbar-sep"></div>
      <button class="btn-icon" id="undo-btn" title="Undo (Ctrl+Z)" disabled>
        &#8630;
      </button>
      <button
        class="btn-icon"
        id="redo-btn"
        title="Redo (Ctrl+Shift+Z)"
        disabled
      >
        &#8631;
      </button>
      <div class="toolbar-sep"></div>
      <button
        class="btn-icon active"
        id="toggle-labels-btn"
        title="Toggle Labels (L)"
      >
        Aa
      </button>
    </div>

    <div id="main">
      <div id="canvas-wrap" class="empty">
        <canvas id="canvas"></canvas>
      </div>
      <div id="sidebar">
        <div class="sidebar-section">
          <h3>Bounding Boxes</h3>
        </div>
        <div class="list-wrap" id="box-list"></div>
        <div class="sidebar-section" style="border-top: 1px solid #0f3460">
          <h3>Labels &amp; Colors</h3>
        </div>
        <div class="list-wrap" id="color-list"></div>
      </div>
    </div>

    <div id="modal-overlay">
      <div id="modal">
        <h3 id="modal-title">Enter Description</h3>
        <input
          type="text"
          id="modal-input"
          placeholder="e.g. car, person, defect..."
        />
        <div class="modal-hint" id="modal-hint"></div>
        <div class="modal-actions">
          <button class="btn btn-secondary" id="modal-cancel">Cancel</button>
          <button class="btn btn-primary" id="modal-ok">OK</button>
        </div>
      </div>
    </div>

    <script>
      (function () {
        // ---- Elements ----
        const fileInput = document.getElementById("file-input");
        const downloadBtn = document.getElementById("download-btn");
        const saveAnnBtn = document.getElementById("save-ann-btn");
        const loadAnnInput = document.getElementById("load-ann-input");
        const thicknessSlider = document.getElementById("thickness");
        const thicknessVal = document.getElementById("thickness-val");
        const fontsizeSlider = document.getElementById("fontsize");
        const fontsizeVal = document.getElementById("fontsize-val");
        const undoBtn = document.getElementById("undo-btn");
        const redoBtn = document.getElementById("redo-btn");
        const canvasWrap = document.getElementById("canvas-wrap");
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const boxListEl = document.getElementById("box-list");
        const colorListEl = document.getElementById("color-list");
        const modalOverlay = document.getElementById("modal-overlay");
        const modalInput = document.getElementById("modal-input");
        const modalOk = document.getElementById("modal-ok");
        const modalCancel = document.getElementById("modal-cancel");
        const modalTitle = document.getElementById("modal-title");
        const modalHint = document.getElementById("modal-hint");
        const toggleLabelsBtn = document.getElementById("toggle-labels-btn");

        // ---- State ----
        let img = null; // original Image object
        let scale = 1; // display scale
        let offsetX = 0,
          offsetY = 0; // canvas offset within wrap
        let boxes = []; // { x, y, w, h, description } in normalized [0,1]
        let colorMap = {}; // description -> hex color
        let selectedIdx = -1;
        let thickness = 2;
        let fontSize = 14;
        let showLabels = true;

        // Drawing state
        let isDrawing = false;
        let drawStart = null; // {nx, ny} normalized
        let drawCurrent = null;

        // Hover crosshair
        let hoverPos = null; // {x, y} in canvas pixels

        // Resize/move state
        let dragMode = null; // 'corner-tl','corner-tr','corner-bl','corner-br','move', null
        let dragStart = null; // {nx, ny}
        let dragOrigBox = null; // copy of box before drag

        // Undo/redo
        let history = [];
        let redoStack = [];
        const MAX_HISTORY = 50;

        // ---- Helpers ----
        function randomColor() {
          const h = Math.floor(Math.random() * 360);
          const s = 60 + Math.floor(Math.random() * 30);
          const l = 45 + Math.floor(Math.random() * 15);
          // Convert HSL to hex
          const c = document.createElement("canvas").getContext("2d");
          c.fillStyle = `hsl(${h},${s}%,${l}%)`;
          return c.fillStyle; // returns hex
        }

        function luminance(hex) {
          const r = parseInt(hex.slice(1, 3), 16) / 255;
          const g = parseInt(hex.slice(3, 5), 16) / 255;
          const b = parseInt(hex.slice(5, 7), 16) / 255;
          const srgb = [r, g, b].map((v) =>
            v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4),
          );
          return 0.2126 * srgb[0] + 0.7152 * srgb[1] + 0.0722 * srgb[2];
        }

        function textColorFor(hex) {
          return luminance(hex) > 0.3 ? "#000000" : "#ffffff";
        }

        function cloneState() {
          return {
            boxes: boxes.map((b) => ({ ...b })),
            colorMap: { ...colorMap },
            selectedIdx,
          };
        }

        function pushHistory() {
          history.push(cloneState());
          if (history.length > MAX_HISTORY) history.shift();
          redoStack = [];
          updateUndoRedoButtons();
        }

        function restoreState(state) {
          boxes = state.boxes.map((b) => ({ ...b }));
          colorMap = { ...state.colorMap };
          selectedIdx = state.selectedIdx;
          if (selectedIdx >= boxes.length) selectedIdx = -1;
        }

        function undo() {
          if (history.length === 0) return;
          redoStack.push(cloneState());
          restoreState(history.pop());
          updateAll();
        }

        function redo() {
          if (redoStack.length === 0) return;
          history.push(cloneState());
          restoreState(redoStack.pop());
          updateAll();
        }

        function updateUndoRedoButtons() {
          undoBtn.disabled = history.length === 0;
          redoBtn.disabled = redoStack.length === 0;
        }

        // Convert normalized coords to canvas pixels
        function n2c(nx, ny) {
          return {
            x: nx * img.naturalWidth * scale + offsetX,
            y: ny * img.naturalHeight * scale + offsetY,
          };
        }
        // Convert canvas pixels to normalized coords
        function c2n(cx, cy) {
          return {
            x: (cx - offsetX) / (img.naturalWidth * scale),
            y: (cy - offsetY) / (img.naturalHeight * scale),
          };
        }

        function getCanvasMousePos(e) {
          const rect = canvas.getBoundingClientRect();
          return { x: e.clientX - rect.left, y: e.clientY - rect.top };
        }

        // ---- Rendering ----
        function render() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          if (!img) return;

          ctx.drawImage(
            img,
            offsetX,
            offsetY,
            img.naturalWidth * scale,
            img.naturalHeight * scale,
          );

          // Draw all boxes
          for (let i = 0; i < boxes.length; i++) {
            drawBox(
              ctx,
              boxes[i],
              i === selectedIdx,
              scale,
              offsetX,
              offsetY,
              img.naturalWidth,
              img.naturalHeight,
              thickness,
              fontSize,
            );
          }

          // Draw preview while drawing
          if (isDrawing && drawStart && drawCurrent) {
            const p1 = n2c(drawStart.x, drawStart.y);
            const p2 = n2c(drawCurrent.x, drawCurrent.y);
            ctx.setLineDash([6, 4]);
            ctx.strokeStyle = "#ffffff";
            ctx.lineWidth = 1;
            ctx.strokeRect(p1.x, p1.y, p2.x - p1.x, p2.y - p1.y);
            ctx.setLineDash([]);
          }

          // Draw crosshair on hover
          if (hoverPos && isInsideImage(hoverPos.x, hoverPos.y)) {
            const imgW = img.naturalWidth * scale;
            const imgH = img.naturalHeight * scale;
            ctx.save();
            ctx.setLineDash([6, 4]);
            ctx.strokeStyle = "rgba(255, 255, 255, 0.5)";
            ctx.lineWidth = 1;
            // Horizontal line across the image
            ctx.beginPath();
            ctx.moveTo(offsetX, hoverPos.y);
            ctx.lineTo(offsetX + imgW, hoverPos.y);
            ctx.stroke();
            // Vertical line across the image
            ctx.beginPath();
            ctx.moveTo(hoverPos.x, offsetY);
            ctx.lineTo(hoverPos.x, offsetY + imgH);
            ctx.stroke();
            ctx.restore();
          }
        }

        function drawBox(
          c,
          box,
          selected,
          sc,
          ox,
          oy,
          imgW,
          imgH,
          thick,
          fsize,
        ) {
          const x = box.x * imgW * sc + ox;
          const y = box.y * imgH * sc + oy;
          const w = box.w * imgW * sc;
          const h = box.h * imgH * sc;
          const color = colorMap[box.description] || "#888888";

          // Box outline
          c.strokeStyle = color;
          c.lineWidth = thick;
          c.strokeRect(x, y, w, h);

          // Label
          if (box.description && showLabels) {
            c.font = `${fsize}px -apple-system, BlinkMacSystemFont, sans-serif`;
            const tm = c.measureText(box.description);
            const labelH = fsize + 6;
            const labelW = tm.width + 8;
            const labelPad = 3;

            let lx = x;
            let ly;
            // If there's enough space above the box
            if (y - labelH - labelPad >= oy) {
              ly = y - labelH - labelPad;
            } else {
              // Place below
              ly = y + h + labelPad;
            }

            c.fillStyle = color;
            c.fillRect(lx, ly, labelW, labelH);
            c.fillStyle = textColorFor(color);
            c.textBaseline = "middle";
            c.fillText(box.description, lx + 4, ly + labelH / 2);
          }

          // Selection handles
          if (selected) {
            c.setLineDash([4, 3]);
            c.strokeStyle = "#ffffff";
            c.lineWidth = 1;
            c.strokeRect(x - 1, y - 1, w + 2, h + 2);
            c.setLineDash([]);

            const handleSize = 8;
            const corners = [
              { cx: x, cy: y },
              { cx: x + w, cy: y },
              { cx: x, cy: y + h },
              { cx: x + w, cy: y + h },
            ];
            for (const corner of corners) {
              c.fillStyle = "#ffffff";
              c.fillRect(
                corner.cx - handleSize / 2,
                corner.cy - handleSize / 2,
                handleSize,
                handleSize,
              );
              c.strokeStyle = color;
              c.lineWidth = 1;
              c.strokeRect(
                corner.cx - handleSize / 2,
                corner.cy - handleSize / 2,
                handleSize,
                handleSize,
              );
            }
          }
        }

        // ---- Sidebar ----
        function updateBoxList() {
          boxListEl.innerHTML = "";
          boxes.forEach((box, i) => {
            const el = document.createElement("div");
            el.className = "box-item" + (i === selectedIdx ? " selected" : "");
            const color = colorMap[box.description] || "#888888";
            el.innerHTML = `
        <div class="swatch" style="background:${color}"></div>
        <div class="desc">${escHtml(box.description || "(no label)")}</div>
        <button class="del-btn" title="Delete">&times;</button>
      `;
            el.addEventListener("click", (e) => {
              if (e.target.closest(".del-btn")) return;
              selectedIdx = i;
              updateAll();
            });
            el.addEventListener("dblclick", (e) => {
              if (e.target.closest(".del-btn")) return;
              editBoxDescription(i);
            });
            el.querySelector(".del-btn").addEventListener("click", () => {
              deleteBox(i);
            });
            boxListEl.appendChild(el);
          });
        }

        function updateColorList() {
          colorListEl.innerHTML = "";
          const descs = Object.keys(colorMap);
          descs.sort();
          descs.forEach((desc) => {
            const el = document.createElement("div");
            el.className = "color-item";
            el.innerHTML = `
        <input type="color" class="color-pick" value="${colorMap[desc]}">
        <div class="color-label">${escHtml(desc)}</div>
      `;
            el.querySelector(".color-pick").addEventListener("input", (e) => {
              pushHistory();
              colorMap[desc] = e.target.value;
              render();
              updateBoxList();
            });
            colorListEl.appendChild(el);
          });
        }

        function updateAll() {
          render();
          updateBoxList();
          updateColorList();
          updateUndoRedoButtons();
        }

        function escHtml(s) {
          const d = document.createElement("div");
          d.textContent = s;
          return d.innerHTML;
        }

        // ---- Actions ----
        function deleteBox(idx) {
          pushHistory();
          boxes.splice(idx, 1);
          if (selectedIdx === idx) selectedIdx = -1;
          else if (selectedIdx > idx) selectedIdx--;
          cleanupColorMap();
          updateAll();
        }

        function cleanupColorMap() {
          const usedDescs = new Set(boxes.map((b) => b.description));
          for (const key of Object.keys(colorMap)) {
            if (!usedDescs.has(key)) delete colorMap[key];
          }
        }

        function editBoxDescription(idx) {
          showModal(
            "Edit Description",
            boxes[idx].description,
            "Current: " + boxes[idx].description,
            (newDesc) => {
              if (newDesc === null || newDesc === boxes[idx].description)
                return;
              pushHistory();
              boxes[idx].description = newDesc;
              if (newDesc && !colorMap[newDesc])
                colorMap[newDesc] = randomColor();
              cleanupColorMap();
              updateAll();
            },
          );
        }

        // ---- Modal ----
        let modalCallback = null;
        function showModal(title, defaultVal, hint, cb) {
          modalTitle.textContent = title;
          modalInput.value = defaultVal || "";
          modalHint.textContent = hint || "";
          modalCallback = cb;
          modalOverlay.classList.add("active");
          setTimeout(() => modalInput.focus(), 50);
        }

        function closeModal(result) {
          modalOverlay.classList.remove("active");
          if (modalCallback) {
            const cb = modalCallback;
            modalCallback = null;
            cb(result);
          }
        }

        modalOk.addEventListener("click", () =>
          closeModal(modalInput.value.trim()),
        );
        modalCancel.addEventListener("click", () => closeModal(null));
        modalInput.addEventListener("keydown", (e) => {
          if (e.key === "Enter") {
            e.preventDefault();
            closeModal(modalInput.value.trim());
          }
          if (e.key === "Escape") closeModal(null);
        });
        modalOverlay.addEventListener("click", (e) => {
          if (e.target === modalOverlay) closeModal(null);
        });

        // ---- Image Upload ----
        fileInput.addEventListener("change", (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (ev) => {
            const newImg = new Image();
            newImg.onload = () => {
              img = newImg;
              boxes = [];
              colorMap = {};
              selectedIdx = -1;
              history = [];
              redoStack = [];
              fitCanvas();
              canvasWrap.classList.remove("empty");
              downloadBtn.disabled = false;
              saveAnnBtn.disabled = false;
              updateAll();
            };
            newImg.src = ev.target.result;
          };
          reader.readAsDataURL(file);
        });

        function fitCanvas() {
          if (!img) return;
          const wrapRect = canvasWrap.getBoundingClientRect();
          const wrapW = wrapRect.width;
          const wrapH = wrapRect.height;
          scale = Math.min(
            wrapW / img.naturalWidth,
            wrapH / img.naturalHeight,
            1,
          );
          const dispW = img.naturalWidth * scale;
          const dispH = img.naturalHeight * scale;
          canvas.width = wrapW;
          canvas.height = wrapH;
          offsetX = (wrapW - dispW) / 2;
          offsetY = (wrapH - dispH) / 2;
        }

        window.addEventListener("resize", () => {
          if (!img) return;
          fitCanvas();
          render();
        });

        // ---- Canvas Mouse Events ----
        function hitTestHandle(mx, my) {
          if (selectedIdx < 0 || selectedIdx >= boxes.length) return null;
          const box = boxes[selectedIdx];
          const corners = [
            { key: "corner-tl", nx: box.x, ny: box.y },
            { key: "corner-tr", nx: box.x + box.w, ny: box.y },
            { key: "corner-bl", nx: box.x, ny: box.y + box.h },
            { key: "corner-br", nx: box.x + box.w, ny: box.y + box.h },
          ];
          const handleR = 8 / (img.naturalWidth * scale); // handle radius in normalized
          for (const c of corners) {
            const cp = n2c(c.nx, c.ny);
            if (Math.abs(mx - cp.x) <= 8 && Math.abs(my - cp.y) <= 8)
              return c.key;
          }
          return null;
        }

        function hitTestBoxBody(mx, my) {
          if (selectedIdx < 0 || selectedIdx >= boxes.length) return false;
          const box = boxes[selectedIdx];
          const tl = n2c(box.x, box.y);
          const br = n2c(box.x + box.w, box.y + box.h);
          const bx1 = Math.min(tl.x, br.x),
            by1 = Math.min(tl.y, br.y);
          const bx2 = Math.max(tl.x, br.x),
            by2 = Math.max(tl.y, br.y);
          return mx >= bx1 && mx <= bx2 && my >= by1 && my <= by2;
        }

        function isInsideImage(mx, my) {
          const imgW = img.naturalWidth * scale;
          const imgH = img.naturalHeight * scale;
          return (
            mx >= offsetX &&
            mx <= offsetX + imgW &&
            my >= offsetY &&
            my <= offsetY + imgH
          );
        }

        canvas.addEventListener("mousedown", (e) => {
          if (!img || modalOverlay.classList.contains("active")) return;
          const pos = getCanvasMousePos(e);

          // Check for handle drag on selected box
          const handle = hitTestHandle(pos.x, pos.y);
          if (handle) {
            pushHistory();
            dragMode = handle;
            dragStart = c2n(pos.x, pos.y);
            dragOrigBox = { ...boxes[selectedIdx] };
            return;
          }

          // Check for body drag on selected box
          if (hitTestBoxBody(pos.x, pos.y)) {
            pushHistory();
            dragMode = "move";
            dragStart = c2n(pos.x, pos.y);
            dragOrigBox = { ...boxes[selectedIdx] };
            return;
          }

          // Otherwise start drawing a new box
          if (!isInsideImage(pos.x, pos.y)) return;
          isDrawing = true;
          drawStart = c2n(pos.x, pos.y);
          drawCurrent = drawStart;
        });

        canvas.addEventListener("mousemove", (e) => {
          if (!img) return;
          const pos = getCanvasMousePos(e);

          // Track hover position for crosshair
          hoverPos = pos;

          // Update cursor
          if (!isDrawing && !dragMode) {
            const handle = hitTestHandle(pos.x, pos.y);
            if (handle) {
              if (handle === "corner-tl" || handle === "corner-br")
                canvas.style.cursor = "nwse-resize";
              else canvas.style.cursor = "nesw-resize";
            } else if (hitTestBoxBody(pos.x, pos.y)) {
              canvas.style.cursor = "move";
            } else {
              canvas.style.cursor = img ? "crosshair" : "default";
            }
            render();
          }

          if (isDrawing) {
            drawCurrent = c2n(pos.x, pos.y);
            render();
            return;
          }

          if (dragMode && dragStart && dragOrigBox) {
            const cur = c2n(pos.x, pos.y);
            const box = boxes[selectedIdx];

            if (dragMode === "move") {
              const dx = cur.x - dragStart.x;
              const dy = cur.y - dragStart.y;
              box.x = dragOrigBox.x + dx;
              box.y = dragOrigBox.y + dy;
            } else {
              // Normalize the original box to get actual corners
              const ox1 = dragOrigBox.x;
              const oy1 = dragOrigBox.y;
              const ox2 = dragOrigBox.x + dragOrigBox.w;
              const oy2 = dragOrigBox.y + dragOrigBox.h;

              let nx1 = ox1,
                ny1 = oy1,
                nx2 = ox2,
                ny2 = oy2;
              if (dragMode === "corner-tl") {
                nx1 = cur.x;
                ny1 = cur.y;
              } else if (dragMode === "corner-tr") {
                nx2 = cur.x;
                ny1 = cur.y;
              } else if (dragMode === "corner-bl") {
                nx1 = cur.x;
                ny2 = cur.y;
              } else if (dragMode === "corner-br") {
                nx2 = cur.x;
                ny2 = cur.y;
              }

              box.x = Math.min(nx1, nx2);
              box.y = Math.min(ny1, ny2);
              box.w = Math.abs(nx2 - nx1);
              box.h = Math.abs(ny2 - ny1);
            }
            render();
          }
        });

        canvas.addEventListener("mouseup", (e) => {
          if (dragMode) {
            dragMode = null;
            dragStart = null;
            dragOrigBox = null;
            updateAll();
            return;
          }

          if (!isDrawing) return;
          isDrawing = false;
          const pos = getCanvasMousePos(e);
          const end = c2n(pos.x, pos.y);

          const nx = Math.min(drawStart.x, end.x);
          const ny = Math.min(drawStart.y, end.y);
          const nw = Math.abs(end.x - drawStart.x);
          const nh = Math.abs(end.y - drawStart.y);

          drawStart = null;
          drawCurrent = null;
          render();

          // Minimum size check (at least 5px in display)
          if (
            nw * img.naturalWidth * scale < 5 ||
            nh * img.naturalHeight * scale < 5
          )
            return;

          showModal(
            "Enter Description",
            "",
            "Assign a label to this bounding box",
            (desc) => {
              if (desc === null) {
                render();
                return;
              }
              if (!desc) desc = "unlabeled";

              pushHistory();
              if (!colorMap[desc]) colorMap[desc] = randomColor();
              boxes.push({ x: nx, y: ny, w: nw, h: nh, description: desc });
              selectedIdx = boxes.length - 1;
              updateAll();
            },
          );
        });

        canvas.addEventListener("mouseleave", () => {
          hoverPos = null;
          if (img) render();
        });

        // ---- Keyboard ----
        document.addEventListener("keydown", (e) => {
          if (modalOverlay.classList.contains("active")) return;

          // Undo/Redo
          if ((e.ctrlKey || e.metaKey) && e.key === "z" && !e.shiftKey) {
            e.preventDefault();
            undo();
            return;
          }
          if (
            (e.ctrlKey || e.metaKey) &&
            (e.key === "Z" || (e.key === "z" && e.shiftKey))
          ) {
            e.preventDefault();
            redo();
            return;
          }

          // Duplicate selected box (Ctrl/Cmd+D)
          if (e.key === "d" || e.key === "D") {
            e.preventDefault();
            if (selectedIdx >= 0 && selectedIdx < boxes.length) {
              pushHistory();
              const src = boxes[selectedIdx];
              const offset = 0.02;
              boxes.push({
                x: src.x + offset,
                y: src.y + offset,
                w: src.w,
                h: src.h,
                description: src.description,
              });
              selectedIdx = boxes.length - 1;
              updateAll();
            }
            return;
          }

          // Delete selected box
          if (
            (e.key === "Delete" || e.key === "Backspace") &&
            selectedIdx >= 0
          ) {
            e.preventDefault();
            deleteBox(selectedIdx);
          }

          // Toggle labels (L)
          if (e.key === "l" || e.key === "L") {
            e.preventDefault();
            toggleLabels();
            return;
          }

          // Escape to deselect
          if (e.key === "Escape" && selectedIdx >= 0) {
            selectedIdx = -1;
            updateAll();
          }
        });

        // ---- Toolbar Controls ----
        thicknessSlider.addEventListener("input", () => {
          thickness = parseInt(thicknessSlider.value);
          thicknessVal.textContent = thickness;
          render();
        });

        fontsizeSlider.addEventListener("input", () => {
          fontSize = parseInt(fontsizeSlider.value);
          fontsizeVal.textContent = fontSize;
          render();
        });

        undoBtn.addEventListener("click", undo);
        redoBtn.addEventListener("click", redo);

        function toggleLabels() {
          showLabels = !showLabels;
          toggleLabelsBtn.classList.toggle("active", showLabels);
          render();
        }
        toggleLabelsBtn.addEventListener("click", toggleLabels);

        // ---- Download ----
        downloadBtn.addEventListener("click", () => {
          if (!img) return;
          const offCanvas = document.createElement("canvas");
          offCanvas.width = img.naturalWidth;
          offCanvas.height = img.naturalHeight;
          const oc = offCanvas.getContext("2d");

          oc.drawImage(img, 0, 0);

          // Scale factor from display to original
          const sf = 1 / scale;
          const scaledThickness = thickness * sf;
          const scaledFontSize = fontSize * sf;

          for (const box of boxes) {
            drawBox(
              oc,
              box,
              false,
              1,
              0,
              0,
              img.naturalWidth,
              img.naturalHeight,
              scaledThickness,
              scaledFontSize,
            );
          }

          offCanvas.toBlob((blob) => {
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "annotated_image.png";
            a.click();
            URL.revokeObjectURL(url);
          }, "image/png");
        });

        // ---- Save/Load Annotations ----
        saveAnnBtn.addEventListener("click", () => {
          if (!img || boxes.length === 0) return;
          const data = {
            image: { width: img.naturalWidth, height: img.naturalHeight },
            colorMap: { ...colorMap },
            boxes: boxes.map((b) => ({
              description: b.description,
              x: b.x,
              y: b.y,
              w: b.w,
              h: b.h,
            })),
          };
          const blob = new Blob([JSON.stringify(data, null, 2)], {
            type: "application/json",
          });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = "annotations.json";
          a.click();
          URL.revokeObjectURL(url);
        });

        loadAnnInput.addEventListener("change", (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (ev) => {
            try {
              const data = JSON.parse(ev.target.result);
              if (!data.boxes || !Array.isArray(data.boxes)) {
                alert('Invalid annotations file: missing "boxes" array.');
                return;
              }
              pushHistory();
              boxes = data.boxes.map((b) => ({
                x: b.x,
                y: b.y,
                w: b.w,
                h: b.h,
                description: b.description || "unlabeled",
              }));
              if (data.colorMap && typeof data.colorMap === "object") {
                colorMap = { ...data.colorMap };
              } else {
                // Assign colors for any descriptions not in the map
                for (const box of boxes) {
                  if (!colorMap[box.description])
                    colorMap[box.description] = randomColor();
                }
              }
              // Ensure all box descriptions have a color
              for (const box of boxes) {
                if (!colorMap[box.description])
                  colorMap[box.description] = randomColor();
              }
              selectedIdx = -1;
              updateAll();
            } catch (err) {
              alert("Failed to parse annotations file: " + err.message);
            }
          };
          reader.readAsText(file);
          // Reset so the same file can be loaded again
          loadAnnInput.value = "";
        });

        // ---- Console Export ----
        window.exportAnnotations = function () {
          if (!img) {
            console.warn("No image loaded.");
            return [];
          }
          const data = boxes.map((b, i) => ({
            index: i,
            description: b.description,
            color: colorMap[b.description] || null,
            normalized: { x: b.x, y: b.y, w: b.w, h: b.h },
            pixels: {
              x: Math.round(b.x * img.naturalWidth),
              y: Math.round(b.y * img.naturalHeight),
              w: Math.round(b.w * img.naturalWidth),
              h: Math.round(b.h * img.naturalHeight),
            },
            image: { width: img.naturalWidth, height: img.naturalHeight },
          }));
          console.log(JSON.stringify(data, null, 2));
          return data;
        };

        // Init
        updateAll();
      })();
    </script>
  </body>
</html>
